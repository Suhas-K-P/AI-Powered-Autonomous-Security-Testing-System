<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 20px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .error { color: red; background: #ffe0e0; padding: 10px; border-radius: 4px; margin: 10px 0; }
    .hint { background: #e8f4fd; padding: 10px; border-radius: 4px; font-size: 13px; margin: 10px 0; }
    .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="hint">
      💡 Try SQL injection: username = <code>admin' --</code>  password = <code>anything</code>
    </div>
    <form method="post">
      <input type="text"     name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p style="margin-top:15px; font-size:13px; color:#666;">
      Normal credentials: alice / password1
    </p>
  </div>
</body>
</html>
