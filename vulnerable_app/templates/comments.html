<!DOCTYPE html>
<html>
<head>
  <title>Comments</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    input, textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .hint { background: #ffe8e8; padding: 10px; border-radius: 4px; font-size: 13px; margin: 10px 0; }
    .comment { border-left: 3px solid #4a90d9; padding: 10px; margin: 8px 0; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="card">
    <h2>💬 Comments</h2>
    <div class="hint">
      💡 Stored XSS: post a comment with body = <code>&lt;script&gt;alert('Stored XSS')&lt;/script&gt;</code>
    </div>
    {% if message %}
    <p style="color:green">{{ message }}</p>
    {% endif %}
    <form method="post">
      <input  type="text" name="username" placeholder="Your name" required />
      <textarea name="comment" rows="3" placeholder="Your comment..." required></textarea>
      <button type="submit">Post Comment</button>
    </form>
  </div>
  <div class="card">
    <h3>All Comments</h3>
    {% for c in comments %}
    <div class="comment">
      <strong>{{ c.username }}</strong> — <small>{{ c.created_at }}</small>
      <!-- !! STORED XSS — comment rendered without escaping !! -->
      <p>{{ c.comment | safe }}</p>
    </div>
    {% endfor %}
  </div>
</body>
</html>
