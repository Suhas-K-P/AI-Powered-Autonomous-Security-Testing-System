<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .welcome { font-size: 24px; color: #2c3e50; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    td, th { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <div class="card">
    <p class="welcome">👋 Welcome, {{ username }}!</p>
    <p>You are logged in. (No real session — username is just a query parameter!)</p>
    {% if user %}
    <table>
      <tr><th>Field</th><th>Value</th></tr>
      {% for key, value in user.items() %}
      <tr><td>{{ key }}</td><td>{{ value }}</td></tr>
      {% endfor %}
    </table>
    {% endif %}
    <br>
    <a href="/login" style="color:#4a90d9">Logout</a>
  </div>
</body>
</html>
